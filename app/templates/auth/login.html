{% extends "base.html" %}
{% block title %}Login — FlaskIQ{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <i class="bi bi-lightning-charge-fill text-blue-600 text-4xl"></i>
      <h1 class="text-2xl font-bold text-gray-900 mt-2">Sign in to FlaskIQ</h1>
      <p class="text-gray-500 text-sm mt-1">Enter your credentials to get a JWT token</p>
    </div>

    <div class="bg-white shadow-sm border border-gray-200 rounded-2xl p-8">
      <form id="login-form" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" name="email" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="you@example.com">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="••••••••">
        </div>

        <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
        <div id="login-success" class="hidden text-sm text-green-700 bg-green-50 border border-green-200 rounded-lg px-3 py-2"></div>

        <button type="submit"
          class="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition text-sm">
          Sign in
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        No account?
        <a href="{{ url_for('register') }}" class="text-blue-600 hover:underline font-medium">Register</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById("login-form").addEventListener("submit", async function (e) {
    e.preventDefault();
    const errBox  = document.getElementById("login-error");
    const okBox   = document.getElementById("login-success");
    errBox.classList.add("hidden");
    okBox.classList.add("hidden");

    const payload = {
      email:    document.getElementById("email").value,
      password: document.getElementById("password").value,
    };

    try {
      const res  = await fetch("/api/v1/auth/login", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(payload),
      });
      const data = await res.json();

      if (res.ok && data.data?.token) {
        localStorage.setItem("flaskiq_token", data.data.token);
        okBox.textContent = "Login successful! Token stored.";
        okBox.classList.remove("hidden");
      } else {
        errBox.textContent = data.message || "Login failed.";
        errBox.classList.remove("hidden");
      }
    } catch (err) {
      errBox.textContent = "Network error: " + err.message;
      errBox.classList.remove("hidden");
    }
  });
</script>
{% endblock %}
