{% extends "base.html" %}
{% block title %}Register — FlaskIQ{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <i class="bi bi-person-plus-fill text-blue-600 text-4xl"></i>
      <h1 class="text-2xl font-bold text-gray-900 mt-2">Create an account</h1>
      <p class="text-gray-500 text-sm mt-1">Sign up to use the FlaskIQ API</p>
    </div>

    <div class="bg-white shadow-sm border border-gray-200 rounded-2xl p-8">
      <form id="register-form" class="space-y-5">
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" id="username" name="username" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="johndoe">
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" name="email" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="you@example.com">
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Min. 8 characters">
        </div>

        <div id="reg-error"   class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
        <div id="reg-success" class="hidden text-sm text-green-700 bg-green-50 border border-green-200 rounded-lg px-3 py-2"></div>

        <button type="submit"
          class="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition text-sm">
          Create account
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="{{ url_for('login') }}" class="text-blue-600 hover:underline font-medium">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById("register-form").addEventListener("submit", async function (e) {
    e.preventDefault();
    const errBox = document.getElementById("reg-error");
    const okBox  = document.getElementById("reg-success");
    errBox.classList.add("hidden");
    okBox.classList.add("hidden");

    const payload = {
      username: document.getElementById("username").value,
      email:    document.getElementById("email").value,
      password: document.getElementById("password").value,
    };

    try {
      const res  = await fetch("/api/v1/auth/register", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(payload),
      });
      const data = await res.json();

      if (res.ok) {
        okBox.textContent = "Account created! You can now log in.";
        okBox.classList.remove("hidden");
        document.getElementById("register-form").reset();
      } else {
        errBox.textContent = data.message || "Registration failed.";
        errBox.classList.remove("hidden");
      }
    } catch (err) {
      errBox.textContent = "Network error: " + err.message;
      errBox.classList.remove("hidden");
    }
  });
</script>
{% endblock %}
