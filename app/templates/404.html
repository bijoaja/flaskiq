{% extends 'base.html' %}
{% block title %}404 — Page Not Found{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-32 px-4 text-center">
  <span class="text-8xl font-extrabold text-blue-100 select-none">404</span>
  <h1 class="text-2xl font-bold text-gray-900 -mt-4 mb-2">Page not found</h1>
  <p class="text-gray-400 text-sm mb-8">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{{ url_for('home') }}"
     class="inline-flex items-center gap-2 bg-blue-600 text-white font-semibold px-6 py-2.5 rounded-lg hover:bg-blue-700 transition text-sm">
    <i class="bi bi-arrow-left"></i> Back to Home
  </a>
</div>
{% endblock %}
