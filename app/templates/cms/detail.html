{% extends 'base.html' %}

{% block title %}{{ page.title }}{% endblock %}

{% block content %}
<main class="main">
  <section class="section py-5">
    <div class="container" data-aos="fade-up">

      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="{{ url_for('view.cms_index') }}">Pages</a>
          </li>
          <li class="breadcrumb-item active" aria-current="page">{{ page.title }}</li>
        </ol>
      </nav>

      <article>
        <h1 class="mb-2">{{ page.title }}</h1>
        <p class="text-muted small mb-4">
          Last updated: {{ page.updated_at.strftime('%d %B %Y') if page.updated_at else '' }}
        </p>
        <div class="cms-content">
          {{ page.content | safe }}
        </div>
      </article>

      <a href="{{ url_for('view.cms_index') }}" class="btn btn-outline-secondary mt-5">
        <i class="bi bi-arrow-left me-1"></i> Back to Pages
      </a>

    </div>
  </section>
</main>
{% endblock %}
