# Production compose — no bind mounts, gunicorn, restart policy
services:
  flaskiq_web:
    build:
      context: .
      dockerfile: Docker/Dockerfile.prod
    container_name: flaskiq_web
    image: bijoaja/flaskiq:latest
    ports:
      - "${FLASK_RUN_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=FALSE
    depends_on:
      flaskiq_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - flaskiq-network

  flaskiq_db:
    image: postgres:17.6
    container_name: flaskiq_db
    environment:
      POSTGRES_DB: flaskiq_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "flaskiq_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - flaskiq-network

volumes:
  postgres_data: {}

networks:
  flaskiq-network:
    driver: bridge
