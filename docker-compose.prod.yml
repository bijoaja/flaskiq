# Production compose — no bind mounts, gunicorn, restart policy
services:
  flaskiq_web:
    build:
      context: .
      dockerfile: Docker/Dockerfile.prod
    container_name: flaskiq_web
    image: bijoaja/flaskiq:latest
    ports:
      - "${FLASK_RUN_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=FALSE
    depends_on:
      flaskiq_db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  flaskiq_db:
    image: mysql:8.4
    container_name: flaskiq_db
    environment:
      MYSQL_DATABASE: flaskiq_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mysql_data: {}

networks:
  app-network:
    driver: bridge
