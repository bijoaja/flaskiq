# Development compose — source is bind-mounted for hot reload
services:
  flaskiq_web:
    build:
      context: .
      dockerfile: Docker/Dockerfile.dev
    container_name: flaskiq_web
    image: bijoaja/flaskiq:dev
    ports:
      - "${FLASK_RUN_PORT:-8080}:8080"
    volumes:
      - .:/app          # bind mount — changes reflected without rebuild
    env_file:
      - .env
    environment:
      - FLASK_DEBUG=TRUE
      - FLASK_ENV=development
    depends_on:
      - flaskiq_db
      #- flaskiq_ai
    networks:
      - flaskiq-network

  flaskiq_db:
    image: postgres:17.6
    container_name: flaskiq_db
    environment:
      POSTGRES_DB: flaskiq_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "flaskiq_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flaskiq-network

  # flaskiq_ai:
  #   image: ollama/ollama:latest
  #   container_name: flaskiq_ai
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   tty: true
  #   stdin_open: true
  #   networks:
  #     - flaskiq-network
  #   entrypoint: ["/bin/bash", "-c"]
  #   command: >
  #     "ollama serve & sleep 5 && ollama pull mistral && wait"

volumes:
  postgres_data: {}
  # ollama_models: {}

networks:
  flaskiq-network:
    driver: bridge
