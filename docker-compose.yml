# Development compose — source is bind-mounted for hot reload
services:
  flaskiq_web:
    build:
      context: .
      dockerfile: Docker/Dockerfile.dev
    container_name: flaskiq_web
    ports:
      - "${FLASK_RUN_PORT:-8080}:8080"
    volumes:
      - .:/app          # bind mount — changes reflected without rebuild
    env_file:
      - .env
    environment:
      - FLASK_DEBUG=TRUE
      - FLASK_ENV=development
    depends_on:
      - flaskiq_db
      - flaskiq_ai
    networks:
      - app-network

  flaskiq_db:
    image: mysql:8.4
    container_name: flaskiq_db
    environment:
      MYSQL_DATABASE: flaskiq_db
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  flaskiq_ai:
    image: ollama/ollama:latest
    container_name: flaskiq_ai
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    tty: true
    stdin_open: true
    networks:
      - app-network
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "ollama serve & sleep 5 && ollama pull mistral && wait"

volumes:
  mysql_data: {}
  ollama_models: {}

networks:
  app-network:
    driver: bridge
